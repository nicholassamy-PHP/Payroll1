const EMPLOYEES = [

  {code:"A22", first_name:"Silva",    last_name:"Danho",     hire_date:"2024-06-02", sin:"", employee_id:"8PB1041", department:"04GHBB DPT", occupation:"Carer", address_line_1:"", city:"", province:"QC", postal_code:"", rate_per_hour:17.00, vacation_rate:0.04, federal_td1_claim:16452, provincial_td1_claim:18952, active:true},
  {code:"A23", first_name:"Lara",     last_name:"Chakal",    hire_date:"2025-09-07", sin:"", employee_id:"8PB1047", department:"04GHBB DPT", occupation:"Carer", address_line_1:"9860 Av. Papineau", city:"Montreal", province:"QC", postal_code:"", rate_per_hour:18.00, vacation_rate:0.04, federal_td1_claim:16452, provincial_td1_claim:18952, active:true}
];

// ============================================================================
//  STORAGE
// ============================================================================

const STORAGE_KEY = "payroll_history_2026";

function loadHistory() {
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw ? JSON.parse(raw) : [];
}

function saveHistory(history) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function ytdBefore(empCode, periodEnd) {
  const history = loadHistory();
  const totals = {
    gross: 0, regular_hours: 0, regular_amount: 0,
    holiday_hours: 0, holiday_amount: 0,
    vacation_hours: 0, vacation_amount: 0,
    special_amount: 0, maternity_hours: 0, maternity_amount: 0,
    federal_tax: 0, quebec_tax: 0,
    ei_ee: 0, qpip_ee: 0, qpp_ee: 0,
    net_pay: 0, vacation_accrual: 0
  };
  history.forEach(p => {
    if (p.period.pay_end_date < periodEnd) {
      const row = p.results.find(r => r.employee_code === empCode);
      if (row) {
        Object.keys(totals).forEach(k => { totals[k] += (row[k] || 0); });
      }
    }
  });
  return totals;
}

// ============================================================================
//  TAX CALCULATIONS
// ============================================================================

function fmt(v) {
  if (typeof v !== 'number' || isNaN(v)) return "0.00";
  return v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function calculateBracket(annualIncome, brackets) {
  let tax = 0;
  let remaining = annualIncome;
  let lastUpper = 0;
  for (const b of brackets) {
    const upper = b.upper === null ? Infinity : b.upper;
    const slice = Math.min(remaining, upper - lastUpper);
    if (slice <= 0) break;
    tax += slice * b.rate;
    remaining -= slice;
    lastUpper = upper;
    if (remaining <= 0) break;
  }
  return tax;
}

function calculateFederalTax(grossThisPeriod, employee, periods) {
  const cfg = TAX_CONFIG.federal;
  const annual = grossThisPeriod * periods;
  const taxOnIncome = calculateBracket(annual, cfg.brackets);

  const bpa = employee.federal_td1_claim || cfg.basic_personal_amount;
  const cea = cfg.canada_employment_amount;
  const ei = Math.min(grossThisPeriod * TAX_CONFIG.ei.ee_rate * periods,
                       TAX_CONFIG.ei.annual_max_insurable * TAX_CONFIG.ei.ee_rate);
  const qpip = Math.min(grossThisPeriod * TAX_CONFIG.qpip.ee_rate * periods,
                         TAX_CONFIG.qpip.annual_max_insurable * TAX_CONFIG.qpip.ee_rate);
  const qpp = Math.min((annual - TAX_CONFIG.qpp.basic_exemption_annual) * TAX_CONFIG.qpp.ee_rate,
                        (TAX_CONFIG.qpp.annual_max_pensionable - TAX_CONFIG.qpp.basic_exemption_annual) * TAX_CONFIG.qpp.ee_rate);

  const credits = (bpa + cea + ei + qpip + Math.max(0, qpp)) * cfg.credit_rate;
  const netFed = Math.max(0, taxOnIncome - credits);
  const afterAbatement = netFed * (1 - cfg.quebec_abatement);

  return Math.max(0, afterAbatement / periods + (employee.additional_federal_tax || 0));
}

function calculateQuebecTax(grossThisPeriod, employee, periods) {
  const cfg = TAX_CONFIG.quebec;
  const annual = grossThisPeriod * periods;
  const taxOnIncome = calculateBracket(annual, cfg.brackets);

  const bpa = employee.provincial_td1_claim || cfg.basic_personal_amount;
  const workerDed = Math.min(annual * cfg.worker_deduction_rate, cfg.worker_deduction_max);

  const credits = bpa * cfg.credit_rate;
  const netQc = Math.max(0, taxOnIncome - workerDed - credits);

  return Math.max(0, netQc / periods + (employee.additional_quebec_tax || 0));
}

function calculatePay(employee, hours, periodEnd) {
  const rate = employee.rate_per_hour;
  const periods = COMPANY.pay_periods_per_year;

  const reg_hrs = hours.regular || 0;
  const reg_amt = reg_hrs * rate;
  const hol_hrs = hours.holiday_paid || 0;
  const hol_amt = hol_hrs * rate;
  const vac_hrs = hours.vacation_paid || 0;
  const vac_amt = vac_hrs * rate;
  const spec_amt = hours.special || 0;
  const mat_hrs = hours.maternity || 0;
  const mat_amt = mat_hrs * rate;

  const gross = reg_amt + hol_amt + vac_amt + spec_amt + mat_amt;
  const ytd = ytdBefore(employee.code, periodEnd);

  let qpp_ee = 0, qpp_er = 0;
  if (ytd.gross < TAX_CONFIG.qpp.annual_max_pensionable) {
    const pensionable = Math.max(0, gross - TAX_CONFIG.qpp.basic_exemption_annual / periods);
    const cap_remain = TAX_CONFIG.qpp.annual_max_pensionable - ytd.gross;
    const pens_capped = Math.min(pensionable, cap_remain);
    qpp_ee = pens_capped * TAX_CONFIG.qpp.ee_rate;
    qpp_er = pens_capped * TAX_CONFIG.qpp.er_rate;
  }

  let ei_ee = 0, ei_er = 0;
  if (!employee.tax_exempt_ei && ytd.gross < TAX_CONFIG.ei.annual_max_insurable) {
    const cap_remain = TAX_CONFIG.ei.annual_max_insurable - ytd.gross;
    const ins = Math.min(gross, cap_remain);
    ei_ee = ins * TAX_CONFIG.ei.ee_rate;
    ei_er = ei_ee * TAX_CONFIG.ei.er_multiplier;
  }

  let qpip_ee = 0, qpip_er = 0;
  if (ytd.gross < TAX_CONFIG.qpip.annual_max_insurable) {
    const cap_remain = TAX_CONFIG.qpip.annual_max_insurable - ytd.gross;
    const ins = Math.min(gross, cap_remain);
    qpip_ee = ins * TAX_CONFIG.qpip.ee_rate;
    qpip_er = ins * TAX_CONFIG.qpip.er_rate;
  }

  const fss = gross * TAX_CONFIG.fss.rate;

  let csst = 0;
  if (ytd.gross < TAX_CONFIG.csst.annual_max_insurable) {
    const cap_remain = TAX_CONFIG.csst.annual_max_insurable - ytd.gross;
    const ins = Math.min(gross, cap_remain);
    csst = ins * TAX_CONFIG.csst.rate;
  }

  const fed_tax = employee.tax_exempt_federal ? 0 : calculateFederalTax(gross, employee, periods);
  const qc_tax = employee.tax_exempt_quebec ? 0 : calculateQuebecTax(gross, employee, periods);
  const vac_accrual = gross * employee.vacation_rate;
  const total_deductions = fed_tax + qc_tax + ei_ee + qpip_ee + qpp_ee;
  const net_pay = gross - total_deductions;

  return {
    employee_code: employee.code,
    regular_hours: reg_hrs, regular_amount: reg_amt,
    holiday_hours: hol_hrs, holiday_amount: hol_amt,
    vacation_hours: vac_hrs, vacation_amount: vac_amt,
    special_amount: spec_amt,
    maternity_hours: mat_hrs, maternity_amount: mat_amt,
    gross, federal_tax: fed_tax, quebec_tax: qc_tax,
    ei_ee, ei_er, qpip_ee, qpip_er, qpp_ee, qpp_er,
    fss, csst, total_deductions, net_pay, vacation_accrual,
    ytd
  };
}

function runPeriod(periodEnd, payDate, hoursByEmp) {
  const history = loadHistory();
  const prevCount = history.filter(p => p.period.pay_end_date < periodEnd).length;

  const period = {
    pay_end_date: periodEnd,
    payment_date: payDate,
    pay_number: prevCount + 1,
    year: parseInt(periodEnd.substring(0, 4))
  };

  const results = EMPLOYEES.filter(e => e.active).map(emp => {
    const hours = hoursByEmp[emp.code] || {};
    return calculatePay(emp, hours, periodEnd);
  });

  const record = {period, results};
  const existingIdx = history.findIndex(p => p.period.pay_end_date === periodEnd);
  if (existingIdx >= 0) {
    history[existingIdx] = record;
  } else {
    history.push(record);
    history.sort((a, b) => a.period.pay_end_date.localeCompare(b.period.pay_end_date));
  }
  saveHistory(history);
  return record;
}

  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById(tabMap[view]);

  if (view === 'dashboard') renderDashboard();
  if (view === 'newPeriod') renderNewPeriod();

}

function submitPayPeriod() {
  const periodEnd = document.getElementById('periodEnd').value;

            <tr><td>EI (Employment Insurance)</td><td class="num">$${fmt(r.ei_ee)}</td><td class="num">$${fmt(ytdEi)}</td></tr>
            <tr><td>QPIP / RQAP (Parental Insurance)</td><td class="num">$${fmt(r.qpip_ee)}</td><td class="num">$${fmt(ytdQpip)}</td></tr>
            <tr><td>Federal Income Tax</td><td class="num">$${fmt(r.federal_tax)}</td><td class="num">$${fmt(ytdFed)}</td></tr>
            <tr><td>Quebec Income Tax</td><td class="num">$${fmt(r.quebec_tax)}</td><td class="num">$${fmt(ytdQc)}</td></tr>
          </tbody>
          <tfoot>
            <tr><td><strong>TOTAL DEDUCTIONS</strong></td><td class="num"><strong>$${fmt(r.total_deductions)}</strong></td><td class="num"><strong>$${fmt(ytdFed + ytdQc + ytdEi + ytdQpip + ytdQpp)}</strong></td></tr>
          </tfoot>
        </table>
      </div>

      <div class="net-pay-box">
        <div>
          <div class="label">Net Pay This Period</div>
          <div style="font-size:11px;opacity:0.85;margin-top:2px;">YTD Net: $${fmt(ytdNet)}</div>
        </div>
        <div class="amount">$${fmt(r.net_pay)}</div>
      </div>

      <div class="payslip-section">
        <h3>Vacation Accrual @ ${(emp.vacation_rate * 100).toFixed(0)}%</h3>
        <table>
          <thead>
            <tr>
              <th>Current Accrual</th>
              <th style="text-align:right;">YTD Accrued</th>
              <th style="text-align:right;">YTD Paid Out</th>
              <th style="text-align:right;">Available Balance</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="num">$${fmt(r.vacation_accrual)}</td>
              <td class="num">$${fmt(ytdVacAccr)}</td>
              <td class="num">$${fmt(ytdVacPaid)}</td>
              <td class="num" style="color:var(--success);font-weight:700;">$${fmt(vacBalance)}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="nn-watermark">— NON NEGOTIABLE —</div>

      <div class="signature-block">
        <div class="info-block">
          <div class="label">Employee Address</div>
          <div class="value" style="margin-bottom:2px;">${emp.first_name} ${emp.last_name}</div>
          <div style="font-size:12px;color:var(--gray-600);">
            ${emp.address_line_1 || ''}<br>
            ${emp.city || ''} ${emp.province} ${emp.postal_code || ''}
          </div>
        </div>
        <div class="info-block" style="text-align:right;">
          <div class="label">Employer</div>
          <div class="value" style="margin-bottom:2px;">${COMPANY.name}</div>
          <div style="font-size:12px;color:var(--gray-600);">Department: ${emp.department || '—'}</div>
        </div>
      </div>
    </div>
  `;
  showView('payslip');
}

function renderHistory() {
  const history = loadHistory();
  document.getElementById('view-history').innerHTML = `
    <div class="card">
      <h2><span class="icon">🗂</span> Pay Period History</h2>
      ${history.length === 0 ? `
        <div class="empty-state">
          <div class="icon">📭</div>
          <p>No pay periods yet.</p>
        </div>
      ` : `
        <table>
          <thead><tr><th>Period End</th><th>Pay #</th><th>Pay Date</th><th>Gross</th><th>Net</th><th>Employees</th><th></th></tr></thead>
          <tbody>
            ${history.slice().reverse().map(p => {
              const tg = p.results.reduce((s, r) => s + r.gross, 0);
              const tn = p.results.reduce((s, r) => s + r.net_pay, 0);
              const paid = p.results.filter(r => r.gross > 0).length;
              return `
                <tr>
                  <td><strong>${p.period.pay_end_date}</strong></td>
                  <td><span class="pill">#${p.period.pay_number}</span></td>
                  <td>${p.period.payment_date}</td>
                  <td class="num">$${fmt(tg)}</td>
                  <td class="num" style="color:var(--success);">$${fmt(tn)}</td>
                  <td>${paid}</td>
                  <td>
                    <button class="primary small" onclick="viewPeriod('${p.period.pay_end_date}')">View</button>
                    <button class="danger" onclick="deletePeriod('${p.period.pay_end_date}')">Delete</button>
                  </td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
      `}
    </div>

    <div class="card">
      <h2><span class="icon">💾</span> Backup & Restore</h2>
      <p style="color:var(--gray-500);font-size:13px;margin-bottom:16px;">
        Data is stored in your browser. Export regularly to back up to a file you control.
      </p>
      <button class="secondary" onclick="exportData()">📥 Export All Data</button>
      <button class="secondary" onclick="document.getElementById('importFile').click()" style="margin-left:8px;">📤 Import Data</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="danger" onclick="clearAllData()" style="margin-left:8px;">🗑 Clear All</button>
    </div>
  `;
}

function deletePeriod(periodEnd) {
  if (!confirm(`Delete pay period ${periodEnd}? This cannot be undone.`)) return;
  const history = loadHistory().filter(p => p.period.pay_end_date !== periodEnd);
  saveHistory(history);
  renderHistory();
}

function clearAllData() {
  if (!confirm('Clear ALL payroll history? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  renderHistory();
}

function exportData() {
  const data = loadHistory();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `payroll_history_${COMPANY.payroll_year}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Invalid format');
      if (!confirm(`Replace current history with ${data.length} period(s)?`)) return;
      saveHistory(data);
      renderHistory();
      alert('✅ Data imported');
    } catch (err) {
      alert('❌ Invalid file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function renderEmployees() {
  document.getElementById('view-employees').innerHTML = `
    <div class="card">
      <h2><span class="icon">👥</span> Active Employees</h2>
      <table>
        <thead><tr><th>Code</th><th>Name</th><th>Occupation</th><th>Rate/hr</th><th>Vac %</th><th>Hire Date</th><th>SIN</th></tr></thead>
        <tbody>
          ${EMPLOYEES.filter(e => e.active).map(e => `
            <tr>
              <td><span class="pill">${e.code}</span></td>
              <td><strong>${e.first_name} ${e.last_name}</strong></td>
              <td>${e.occupation}</td>
              <td class="num">$${e.rate_per_hour.toFixed(2)}</td>
              <td class="num">${(e.vacation_rate * 100).toFixed(0)}%</td>
              <td>${e.hire_date}</td>
              <td>${e.sin || '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

showView('dashboard');
