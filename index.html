// ============================================================================
//  STATE — saved in localStorage
// ============================================================================

const STORAGE_KEY = "payroll_history_2026";

function loadHistory() {
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw ? JSON.parse(raw) : [];
}

function saveHistory(history) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function ytdBefore(empCode, periodEnd) {
  // Sum YTD across all periods before this one
  const history = loadHistory();
  const totals = {
    gross: 0, regular_hours: 0, regular_amount: 0,
    holiday_hours: 0, holiday_amount: 0,
    vacation_hours: 0, vacation_amount: 0,
    special_amount: 0, maternity_hours: 0, maternity_amount: 0,
    federal_tax: 0, quebec_tax: 0,
    ei_ee: 0, qpip_ee: 0, qpp_ee: 0,
    net_pay: 0, vacation_accrual: 0
  };
  history.forEach(p => {
    if (p.period.pay_end_date < periodEnd) {
      const row = p.results.find(r => r.employee_code === empCode);
      if (row) {
        Object.keys(totals).forEach(k => { totals[k] += (row[k] || 0); });
      }
    }
  });
  return totals;
}

// ============================================================================
//  PAYROLL CALCULATION ENGINE
// ============================================================================

function fmt(v) {
  if (typeof v !== 'number' || isNaN(v)) return "0.00";
  return v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function calculateBracket(annualIncome, brackets) {
  let tax = 0;
  let remaining = annualIncome;
  let lastUpper = 0;
  for (const b of brackets) {
    const upper = b.upper === null ? Infinity : b.upper;
    const slice = Math.min(remaining, upper - lastUpper);
    if (slice <= 0) break;
    tax += slice * b.rate;
    remaining -= slice;
    lastUpper = upper;
    if (remaining <= 0) break;
  }
  return tax;
}

function calculateFederalTax(grossThisPeriod, employee, periods) {
  const cfg = TAX_CONFIG.federal;
  const annual = grossThisPeriod * periods;
  const taxOnIncome = calculateBracket(annual, cfg.brackets);

  // Credits
  const bpa = employee.federal_td1_claim || cfg.basic_personal_amount;
  const cea = cfg.canada_employment_amount;
  const ei = Math.min(grossThisPeriod * TAX_CONFIG.ei.ee_rate * periods,
                       TAX_CONFIG.ei.annual_max_insurable * TAX_CONFIG.ei.ee_rate);
  const qpip = Math.min(grossThisPeriod * TAX_CONFIG.qpip.ee_rate * periods,
                         TAX_CONFIG.qpip.annual_max_insurable * TAX_CONFIG.qpip.ee_rate);
  const qpp = Math.min((annual - TAX_CONFIG.qpp.basic_exemption_annual) * TAX_CONFIG.qpp.ee_rate,
                        (TAX_CONFIG.qpp.annual_max_pensionable - TAX_CONFIG.qpp.basic_exemption_annual) * TAX_CONFIG.qpp.ee_rate);

  const credits = (bpa + cea + ei + qpip + Math.max(0, qpp)) * cfg.credit_rate;
  const netFed = Math.max(0, taxOnIncome - credits);
  const afterAbatement = netFed * (1 - cfg.quebec_abatement);

  return Math.max(0, afterAbatement / periods + (employee.additional_federal_tax || 0));
}

function calculateQuebecTax(grossThisPeriod, employee, periods) {
  const cfg = TAX_CONFIG.quebec;
  const annual = grossThisPeriod * periods;
  const taxOnIncome = calculateBracket(annual, cfg.brackets);

  const bpa = employee.provincial_td1_claim || cfg.basic_personal_amount;
  const workerDed = Math.min(annual * cfg.worker_deduction_rate, cfg.worker_deduction_max);

  const credits = bpa * cfg.credit_rate;
  const netQc = Math.max(0, taxOnIncome - workerDed - credits);

  return Math.max(0, netQc / periods + (employee.additional_quebec_tax || 0));
}

function calculatePay(employee, hours, periodEnd) {
  const rate = employee.rate_per_hour;
  const periods = COMPANY.pay_periods_per_year;

  // Earnings
  const reg_hrs = hours.regular || 0;
  const reg_amt = reg_hrs * rate;
  const hol_hrs = hours.holiday_paid || 0;
  const hol_amt = hol_hrs * rate;
  const vac_hrs = hours.vacation_paid || 0;
  const vac_amt = vac_hrs * rate;
  const spec_amt = hours.special || 0;
  const mat_hrs = hours.maternity || 0;
  const mat_amt = mat_hrs * rate;

  const gross = reg_amt + hol_amt + vac_amt + spec_amt + mat_amt;

  // YTD before this period (for ceiling checks)
  const ytd = ytdBefore(employee.code, periodEnd);

  // QPP (with annual exemption distributed per pay)
  let qpp_ee = 0, qpp_er = 0;
  if (ytd.gross < TAX_CONFIG.qpp.annual_max_pensionable) {
    const pensionable = Math.max(0, gross - TAX_CONFIG.qpp.basic_exemption_annual / periods);
    const cap_remain = TAX_CONFIG.qpp.annual_max_pensionable - ytd.gross;
    const pens_capped = Math.min(pensionable, cap_remain);
    qpp_ee = pens_capped * TAX_CONFIG.qpp.ee_rate;
    qpp_er = pens_capped * TAX_CONFIG.qpp.er_rate;
  }

  // EI (capped at annual max)
  let ei_ee = 0, ei_er = 0;
  if (!employee.tax_exempt_ei && ytd.gross < TAX_CONFIG.ei.annual_max_insurable) {
    const cap_remain = TAX_CONFIG.ei.annual_max_insurable - ytd.gross;
    const ins = Math.min(gross, cap_remain);
    ei_ee = ins * TAX_CONFIG.ei.ee_rate;
    ei_er = ei_ee * TAX_CONFIG.ei.er_multiplier;
  }

  // QPIP (capped)
  let qpip_ee = 0, qpip_er = 0;
  if (ytd.gross < TAX_CONFIG.qpip.annual_max_insurable) {
    const cap_remain = TAX_CONFIG.qpip.annual_max_insurable - ytd.gross;
    const ins = Math.min(gross, cap_remain);
    qpip_ee = ins * TAX_CONFIG.qpip.ee_rate;
    qpip_er = ins * TAX_CONFIG.qpip.er_rate;
  }

  // FSS (employer-only, no cap)
  const fss = gross * TAX_CONFIG.fss.rate;

  // CSST (employer-only, capped)
  let csst = 0;
  if (ytd.gross < TAX_CONFIG.csst.annual_max_insurable) {
    const cap_remain = TAX_CONFIG.csst.annual_max_insurable - ytd.gross;
    const ins = Math.min(gross, cap_remain);
    csst = ins * TAX_CONFIG.csst.rate;
  }

  // Income taxes
  const fed_tax = employee.tax_exempt_federal ? 0 : calculateFederalTax(gross, employee, periods);
  const qc_tax = employee.tax_exempt_quebec ? 0 : calculateQuebecTax(gross, employee, periods);

  // Vacation accrual
  const vac_accrual = gross * employee.vacation_rate;

  // Net pay
  const total_deductions = fed_tax + qc_tax + ei_ee + qpip_ee + qpp_ee;
  const net_pay = gross - total_deductions;

  return {
    employee_code: employee.code,
    regular_hours: reg_hrs, regular_amount: reg_amt,
    holiday_hours: hol_hrs, holiday_amount: hol_amt,
    vacation_hours: vac_hrs, vacation_amount: vac_amt,
    special_amount: spec_amt,
    maternity_hours: mat_hrs, maternity_amount: mat_amt,
    gross: gross,
    federal_tax: fed_tax, quebec_tax: qc_tax,
    ei_ee: ei_ee, ei_er: ei_er,
    qpip_ee: qpip_ee, qpip_er: qpip_er,
    qpp_ee: qpp_ee, qpp_er: qpp_er,
    fss: fss, csst: csst,
    total_deductions: total_deductions,
    net_pay: net_pay,
    vacation_accrual: vac_accrual,
    ytd: ytd
  };
}

function runPeriod(periodEnd, payDate, hoursByEmp) {
  const history = loadHistory();
  const prevCount = history.filter(p => p.period.pay_end_date < periodEnd).length;

  const period = {
    pay_end_date: periodEnd,
    payment_date: payDate,
    pay_number: prevCount + 1,
    year: parseInt(periodEnd.substring(0, 4))
  };

  const results = EMPLOYEES.filter(e => e.active).map(emp => {
    const hours = hoursByEmp[emp.code] || {};
    return calculatePay(emp, hours, periodEnd);
  });

  // Save to history
  const record = {period, results};
  const existingIdx = history.findIndex(p => p.period.pay_end_date === periodEnd);
  if (existingIdx >= 0) {
    history[existingIdx] = record;
  } else {
    history.push(record);
    history.sort((a, b) => a.period.pay_end_date.localeCompare(b.period.pay_end_date));
  }
  saveHistory(history);

  return record;
}

function showView(view) {
  ['dashboard', 'newPeriod', 'history', 'employees', 'payslip'].forEach(v => {
    document.getElementById(`view-${v}`).style.display = v === view ? '' : 'none';
    const btn = document.getElementById(`nav${v.charAt(0).toUpperCase() + v.slice(1)}`);
    if (btn) btn.classList.toggle('active', v === view);
  });

  if (view === 'dashboard') renderDashboard();
  if (view === 'newPeriod') renderNewPeriod();
  if (view === 'history') renderHistory();
  if (view === 'employees') renderEmployees();
}

function updatePayDate() {
  const end = document.getElementById('periodEnd').value;
  if (end) {
    const d = new Date(end);
    d.setDate(d.getDate() + 6);
    document.getElementById('payDate').value = d.toISOString().split('T')[0];
  }
}

function submitPayPeriod() {
  const periodEnd = document.getElementById('periodEnd').value;
  const payDate = document.getElementById('payDate').value;
  if (!periodEnd || !payDate) {
    alert('Please enter both period end and payment dates');
    return;
  }

  const active = EMPLOYEES.filter(e => e.active);
  const hoursByEmp = {};
  active.forEach(emp => {
    hoursByEmp[emp.code] = {
      regular: parseFloat(document.getElementById(`reg_${emp.code}`).value || 0),
      holiday_paid: parseFloat(document.getElementById(`hol_${emp.code}`).value || 0),
      vacation_paid: parseFloat(document.getElementById(`vac_${emp.code}`).value || 0),
      special: parseFloat(document.getElementById(`spec_${emp.code}`).value || 0),
      maternity: parseFloat(document.getElementById(`mat_${emp.code}`).value || 0),
    };
  });

  const record = runPeriod(periodEnd, payDate, hoursByEmp);
  const totalGross = record.results.reduce((s, r) => s + r.gross, 0);
  const totalNet = record.results.reduce((s, r) => s + r.net_pay, 0);

  alert(`✅ Payroll calculated!\n\nTotal Gross: $${fmt(totalGross)}\nTotal Net: $${fmt(totalNet)}`);
  viewPeriod(periodEnd);
}

function renderHistory() {
  const history = loadHistory();
  document.getElementById('view-history').innerHTML = `
    <div class="card">
      <h2>📋 Pay Period History</h2>
      ${history.length === 0 ? '<p>No periods yet.</p>' : `
        <table>
          <thead><tr><th>Period End</th><th>Pay #</th><th>Pay Date</th><th>Gross</th><th>Net</th><th>Actions</th></tr></thead>
          <tbody>
            ${history.slice().reverse().map(p => {
              const tg = p.results.reduce((s, r) => s + r.gross, 0);
              const tn = p.results.reduce((s, r) => s + r.net_pay, 0);
              return `
                <tr>
                  <td><strong>${p.period.pay_end_date}</strong></td>
                  <td>#${p.period.pay_number}</td>
                  <td>${p.period.payment_date}</td>
                  <td class="num">$${fmt(tg)}</td>
                  <td class="num">$${fmt(tn)}</td>
                  <td>
                    <button class="primary" onclick="viewPeriod('${p.period.pay_end_date}')">View</button>
                    <button class="danger" onclick="deletePeriod('${p.period.pay_end_date}')">Delete</button>
                  </td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
      `}
    </div>
    <div class="card">
      <h2>⚙️ Data Management</h2>
      <button class="secondary" onclick="exportData()">📥 Export All Data (JSON)</button>
      <button class="secondary" onclick="document.getElementById('importFile').click()" style="margin-left:8px;">📤 Import Data</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="danger" onclick="clearAllData()" style="margin-left:8px;">🗑 Clear All History</button>
    </div>
  `;
}

function deletePeriod(periodEnd) {
  if (!confirm(`Delete pay period ${periodEnd}? This cannot be undone.`)) return;
  const history = loadHistory().filter(p => p.period.pay_end_date !== periodEnd);
  saveHistory(history);
  renderHistory();
}

function clearAllData() {
  if (!confirm('Clear ALL payroll history? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  renderHistory();
}

function exportData() {
  const data = loadHistory();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `payroll_history_${COMPANY.payroll_year}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Invalid format');
      if (!confirm(`Replace current history with ${data.length} period(s)?`)) return;
      saveHistory(data);
      renderHistory();
      alert('✅ Data imported');
    } catch (err) {
      alert('❌ Invalid file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function renderEmployees() {
  document.getElementById('view-employees').innerHTML = `
    <div class="card">
      <h2>👥 Employees</h2>
      <table>
        <thead><tr><th>Code</th><th>Name</th><th>Rate/hr</th><th>Vac %</th><th>Hire Date</th><th>SIN</th></tr></thead>
        <tbody>
          ${EMPLOYEES.filter(e => e.active).map(e => `
            <tr>
              <td><strong>${e.code}</strong></td>
              <td>${e.first_name} ${e.last_name}</td>
              <td class="num">$${e.rate_per_hour.toFixed(2)}</td>
              <td class="num">${(e.vacation_rate * 100).toFixed(0)}%</td>
              <td>${e.hire_date}</td>
              <td>${e.sin || '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <p style="margin-top:12px;color:#7f8c8d;font-size:13px;">
        To add or modify employees, edit the <code>EMPLOYEES</code> array in the source code.
      </p>
    </div>
  `;
}

function viewPeriod(periodEnd) {
  const history = loadHistory();
  const rec = history.find(p => p.period.pay_end_date === periodEnd);
  if (!rec) { alert('Period not found'); return; }

  const totalGross = rec.results.reduce((s, r) => s + r.gross, 0);
  const totalNet = rec.results.reduce((s, r) => s + r.net_pay, 0);
  const totalDed = rec.results.reduce((s, r) => s + r.total_deductions, 0);

  let html = `
    <div class="card no-print">
      <h2>📄 Pay Period — ${rec.period.pay_end_date}</h2>
      <p><strong>Payment date:</strong> ${rec.period.payment_date} · <strong>Pay #${rec.period.pay_number}</strong></p>
      <button class="secondary" onclick="showView('dashboard')">← Back</button>
      <button class="primary" onclick="window.print()" style="margin-left:8px;">🖨 Print All</button>
    </div>
    <div class="card">
      <h2>📊 Run Summary</h2>
      <table>
        <tr><td><strong>Total Gross:</strong></td><td class="num"><strong>$${fmt(totalGross)}</strong></td></tr>
        <tr><td><strong>Total Deductions:</strong></td><td class="num">$${fmt(totalDed)}</td></tr>
        <tr><td><strong>Total Net Pay:</strong></td><td class="num"><strong style="color:#27ae60;">$${fmt(totalNet)}</strong></td></tr>
      </table>
    </div>
    <div class="card">
      <h2>👥 Per-Employee Breakdown</h2>
      <table>
        <thead><tr><th>Employee</th><th>Gross</th><th>Fed Tax</th><th>QC Tax</th><th>EI</th><th>QPIP</th><th>QPP</th><th>Net Pay</th><th>Vac Accr</th><th>Action</th></tr></thead>
        <tbody>
          ${rec.results.filter(r => r.gross > 0).map(r => {
            const emp = EMPLOYEES.find(e => e.code === r.employee_code);
            return `
              <tr>
                <td><strong>${emp ? emp.first_name + ' ' + emp.last_name : r.employee_code}</strong></td>
                <td class="num">$${fmt(r.gross)}</td>
                <td class="num">$${fmt(r.federal_tax)}</td>
                <td class="num">$${fmt(r.quebec_tax)}</td>
                <td class="num">$${fmt(r.ei_ee)}</td>
                <td class="num">$${fmt(r.qpip_ee)}</td>
                <td class="num">$${fmt(r.qpp_ee)}</td>
                <td class="num" style="font-weight:bold;color:#27ae60;">$${fmt(r.net_pay)}</td>
                <td class="num">$${fmt(r.vacation_accrual)}</td>
                <td><button class="primary" onclick="showPayslip('${periodEnd}','${r.employee_code}')">📄</button></td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById('view-payslip').innerHTML = html;
  showView('payslip');
}

function showPayslip(periodEnd, empCode) {
  const history = loadHistory();
  const rec = history.find(p => p.period.pay_end_date === periodEnd);
  if (!rec) return;
  const r = rec.results.find(x => x.employee_code === empCode);
  const emp = EMPLOYEES.find(e => e.code === empCode);
  if (!r || !emp) return;

  const ytdGross = (r.ytd.gross || 0) + r.gross;
  const ytdNet = (r.ytd.net_pay || 0) + r.net_pay;
  const ytdFed = (r.ytd.federal_tax || 0) + r.federal_tax;
  const ytdQc = (r.ytd.quebec_tax || 0) + r.quebec_tax;
  const ytdEi = (r.ytd.ei_ee || 0) + r.ei_ee;
  const ytdQpip = (r.ytd.qpip_ee || 0) + r.qpip_ee;
  const ytdQpp = (r.ytd.qpp_ee || 0) + r.qpp_ee;
  const ytdVacAccr = (r.ytd.vacation_accrual || 0) + r.vacation_accrual;
  const ytdVacPaid = (r.ytd.vacation_amount || 0) + r.vacation_amount;

  document.getElementById('view-payslip').innerHTML = `
    <div class="no-print" style="margin-bottom:12px;">
      <button class="secondary" onclick="viewPeriod('${periodEnd}')">← Back to Period</button>
      <button class="primary" onclick="window.print()" style="margin-left:8px;">🖨 Print</button>
    </div>
    <div class="payslip">
      <div class="payslip-header">${COMPANY.name}</div>
      <div style="text-align:center;font-size:9pt;">${COMPANY.address}</div>
      <div class="payslip-title">STATEMENT OF EARNINGS AND DEDUCTIONS</div>

      <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
        <div>
          <div><b>HIRE DATE:</b> ${emp.hire_date}</div>
          <div><b>EMPLOYEE ID:</b> ${emp.employee_id}</div>
          <div><b>OCCUPATION:</b> ${emp.occupation}</div>
        </div>
        <div style="text-align:right;">
          <div><b>PAYMENT DATE:</b> ${rec.period.payment_date}</div>
          <div><b>PAY END DATE:</b> ${rec.period.pay_end_date}</div>
          <div><b>PAY #:</b> ${rec.period.pay_number} of ${COMPANY.pay_periods_per_year}</div>
        </div>
      </div>

      <table>
        <thead><tr><th style="text-align:left">EARNINGS</th><th>RATE</th><th>HRS</th><th>AMOUNT</th><th>YTD HRS</th><th>YTD AMT</th></tr></thead>
        <tbody>
          <tr><td>REGULAR</td><td class="num">${fmt(emp.rate_per_hour)}</td><td class="num">${fmt(r.regular_hours)}</td><td class="num">${fmt(r.regular_amount)}</td><td class="num">${fmt(r.ytd.regular_hours + r.regular_hours)}</td><td class="num">${fmt(r.ytd.regular_amount + r.regular_amount)}</td></tr>
          <tr><td>HOLIDAY</td><td class="num">${fmt(emp.rate_per_hour)}</td><td class="num">${fmt(r.holiday_hours)}</td><td class="num">${fmt(r.holiday_amount)}</td><td class="num">${fmt(r.ytd.holiday_hours + r.holiday_hours)}</td><td class="num">${fmt(r.ytd.holiday_amount + r.holiday_amount)}</td></tr>
          <tr><td>VACATION</td><td class="num">${fmt(emp.rate_per_hour)}</td><td class="num">${fmt(r.vacation_hours)}</td><td class="num">${fmt(r.vacation_amount)}</td><td class="num">${fmt(r.ytd.vacation_hours + r.vacation_hours)}</td><td class="num">${fmt(r.ytd.vacation_amount + r.vacation_amount)}</td></tr>
          <tr><td>SPECIAL</td><td class="num">${fmt(emp.rate_per_hour)}</td><td class="num">—</td><td class="num">${fmt(r.special_amount)}</td><td class="num">—</td><td class="num">${fmt(r.ytd.special_amount + r.special_amount)}</td></tr>
          <tr><td>MATERNITY</td><td class="num">${fmt(emp.rate_per_hour)}</td><td class="num">${fmt(r.maternity_hours)}</td><td class="num">${fmt(r.maternity_amount)}</td><td class="num">${fmt(r.ytd.maternity_hours + r.maternity_hours)}</td><td class="num">${fmt(r.ytd.maternity_amount + r.maternity_amount)}</td></tr>
          <tr style="font-weight:bold;background:#f7f7f7;"><td>TOTAL GROSS</td><td></td><td></td><td class="num">${fmt(r.gross)}</td><td></td><td class="num">${fmt(ytdGross)}</td></tr>
        </tbody>
      </table>

      <table style="margin-top:8px;">
        <thead><tr><th style="text-align:left">DEDUCTIONS</th><th>CURRENT</th><th>YTD</th></tr></thead>
        <tbody>
          <tr><td>QPP (Govt Pension)</td><td class="num">${fmt(r.qpp_ee)}</td><td class="num">${fmt(ytdQpp)}</td></tr>
          <tr><td>EI</td><td class="num">${fmt(r.ei_ee)}</td><td class="num">${fmt(ytdEi)}</td></tr>
          <tr><td>QPIP / RQAP</td><td class="num">${fmt(r.qpip_ee)}</td><td class="num">${fmt(ytdQpip)}</td></tr>
          <tr><td>Federal Income Tax</td><td class="num">${fmt(r.federal_tax)}</td><td class="num">${fmt(ytdFed)}</td></tr>
          <tr><td>Quebec Income Tax</td><td class="num">${fmt(r.quebec_tax)}</td><td class="num">${fmt(ytdQc)}</td></tr>
          <tr style="font-weight:bold;background:#f7f7f7;"><td>TOTAL DEDUCTIONS</td><td class="num">${fmt(r.total_deductions)}</td><td class="num">${fmt(ytdFed + ytdQc + ytdEi + ytdQpip + ytdQpp)}</td></tr>
        </tbody>
      </table>

      <div class="net-pay">NET PAY: <strong>$${fmt(r.net_pay)}</strong></div>

      <table>
        <thead><tr><th style="text-align:left">VACATION @ ${(emp.vacation_rate * 100).toFixed(0)}%</th><th>CURRENT</th><th>YTD ACCRUED</th><th>YTD PAID</th><th>BALANCE</th></tr></thead>
        <tbody>
          <tr><td>Accrual</td><td class="num">${fmt(r.vacation_accrual)}</td><td class="num">${fmt(ytdVacAccr)}</td><td class="num">${fmt(ytdVacPaid)}</td><td class="num">${fmt(ytdVacAccr - ytdVacPaid)}</td></tr>
        </tbody>
      </table>

      <div style="text-align:center;font-weight:bold;margin-top:14px;">— NON NEGOTIABLE —</div>

      <div style="display:flex;justify-content:space-between;gap:24px;font-size:9.5pt;margin-top:18px;">
        <div style="flex:1;">
          <div><strong>${emp.first_name} ${emp.last_name}</strong></div>
          <div>${emp.address_line_1}</div>
          <div>${emp.city} ${emp.province} ${emp.postal_code}</div>
          <div>SIN: ${emp.sin || 'N/A'}</div>
        </div>
        <div style="flex:1;text-align:right;">
          <div><strong>${COMPANY.name}</strong></div>
          <div>Dept: ${emp.department}</div>
        </div>
      </div>
    </div>
  `;
  showView('payslip');
}

showView('dashboard');
</script>
