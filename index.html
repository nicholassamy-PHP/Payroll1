<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quebec Payroll System</title>
<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --primary-light: #eef2ff;
    --success: #10b981;
    --success-dark: #059669;
    --success-light: #d1fae5;
    --danger: #ef4444;
    --warning: #f59e0b;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
    --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 100%);
    color: var(--gray-800);
    line-height: 1.5;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    color: white;
    padding: 32px 24px;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  header .subtitle { font-size: 13px; opacity: 0.9; margin-top: 4px; }
  .badge {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.2);
  }
  main { max-width: 1280px; margin: 24px auto; padding: 0 24px; }

  nav.tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: white;
    padding: 6px;
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    flex-wrap: wrap;
  }
  nav.tabs button {
    flex: 1;
    min-width: 120px;
    padding: 12px 16px;
    background: transparent;
    border: none;
    border-radius: 10px;
    color: var(--gray-600);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    font-family: inherit;
  }
  nav.tabs button:hover { background: var(--gray-100); color: var(--gray-800); }
  nav.tabs button.active {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-100);
  }
  .card h2 {
    font-size: 19px;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.01em;
  }
  .card h2 .icon { font-size: 22px; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat {
    background: white;
    padding: 22px;
    border-radius: 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-100);
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 4px; height: 100%;
    background: var(--primary);
  }
  .stat.success::before { background: var(--success); }
  .stat.warning::before { background: var(--warning); }
  .stat .label { font-size: 11px; color: var(--gray-500); font-weight: 600;
                 text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .stat .value { font-size: 28px; font-weight: 700; color: var(--gray-900); letter-spacing: -0.02em; }
  .stat .value.success { color: var(--success); }
  .stat .value.primary { color: var(--primary); }
  .stat .sub { font-size: 11px; color: var(--gray-500); margin-top: 4px; }

  button {
    padding: 11px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  button.primary {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    box-shadow: 0 2px 6px rgba(99, 102, 241, 0.25);
  }
  button.primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(99, 102, 241, 0.35); }
  button.success {
    background: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
    color: white;
    box-shadow: 0 2px 6px rgba(16, 185, 129, 0.25);
  }
  button.success:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(16, 185, 129, 0.35); }
  button.secondary { background: white; color: var(--gray-700); border: 1px solid var(--gray-200); }
  button.secondary:hover { background: var(--gray-50); border-color: var(--gray-300); }
  button.danger { background: var(--danger); color: white; padding: 8px 14px; font-size: 12px; }
  button.danger:hover { background: #dc2626; }
  button.small { padding: 8px 14px; font-size: 12px; }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  input, select, textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.15s;
    background: white;
    color: var(--gray-800);
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
  }
  label {
    display: block;
    font-weight: 600;
    font-size: 12px;
    color: var(--gray-600);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }

  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    background: var(--gray-50);
    padding: 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-600);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--gray-200);
  }
  td {
    padding: 16px 14px;
    border-bottom: 1px solid var(--gray-100);
    font-size: 14px;
    color: var(--gray-800);
  }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--gray-50); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  tfoot td { font-weight: 700; background: var(--gray-50); color: var(--gray-900); }

  .pill {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    background: var(--primary-light);
    color: var(--primary-dark);
  }
  .pill.success { background: var(--success-light); color: var(--success-dark); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-500);
  }
  .empty-state .icon { font-size: 64px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state h3 { font-size: 18px; color: var(--gray-700); margin-bottom: 8px; }
  .empty-state p { margin-bottom: 20px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal {
    background: white;
    border-radius: 16px;
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { font-size: 18px; font-weight: 700; }
  .modal-body { padding: 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--gray-100);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .close-btn {
    background: transparent;
    border: none;
    font-size: 24px;
    color: var(--gray-400);
    cursor: pointer;
    padding: 0;
    width: 32px; height: 32px;
    border-radius: 8px;
  }
  .close-btn:hover { background: var(--gray-100); color: var(--gray-700); }

  /* PAYSLIP */
  .payslip {
    max-width: 850px;
    margin: 0 auto;
    background: white;
    border-radius: 14px;
    padding: 48px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--gray-200);
  }
  .payslip-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-bottom: 24px;
    border-bottom: 3px solid var(--primary);
    margin-bottom: 32px;
  }
  .payslip-company {
    font-size: 24px;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }
  .payslip-company-meta { font-size: 13px; color: var(--gray-500); }
  .payslip-stub {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    box-shadow: 0 4px 12px rgba(99,102,241,0.3);
  }
  .payslip-section { margin-bottom: 28px; }
  .payslip-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--primary);
    font-weight: 700;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--gray-100);
  }
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .info-block { font-size: 13px; }
  .info-block .label { font-size: 10px; color: var(--gray-500); text-transform: uppercase;
                       letter-spacing: 0.06em; font-weight: 600; margin-bottom: 2px; margin-top: 12px; }
  .info-block .label:first-child { margin-top: 0; }
  .info-block .value { color: var(--gray-900); font-weight: 600; }
  .payslip table { border: 1px solid var(--gray-200); border-radius: 10px; overflow: hidden; }
  .payslip th { font-size: 11px; padding: 10px 12px; background: var(--gray-50); }
  .payslip td { padding: 11px 12px; font-size: 13px; }
  .net-pay-box {
    background: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
    color: white;
    padding: 28px;
    border-radius: 14px;
    margin: 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
  }
  .net-pay-box .label { font-size: 13px; opacity: 0.95; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
  .net-pay-box .amount { font-size: 36px; font-weight: 800; letter-spacing: -0.02em; }
  .nn-watermark {
    text-align: center;
    font-size: 11px;
    color: var(--gray-400);
    letter-spacing: 0.4em;
    margin: 28px 0 20px;
    font-weight: 700;
  }
  .signature-block {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--gray-100);
  }

  .help-banner {
    background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    border: 1px solid #fbbf24;
    color: #78350f;
    padding: 16px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    font-size: 13px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .help-banner .icon { font-size: 20px; }

  @media print {
    nav.tabs, header, footer, .no-print, .stat-grid, .help-banner { display: none !important; }
    body { background: white; }
    .card { box-shadow: none; border: none; padding: 0; }
    .payslip { box-shadow: none; border: none; padding: 0; max-width: 100%; }
  }

  footer {
    text-align: center;
    padding: 30px 20px;
    color: var(--gray-500);
    font-size: 12px;
  }

  @media (max-width: 768px) {
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: 1fr; }
    .signature-block { grid-template-columns: 1fr; }
    .payslip { padding: 24px; }
    .payslip-top { flex-direction: column; gap: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1 id="companyName">Garderie La Belle Academie Inc.</h1>

    </div>
    <div class="badge">Year 2026 · 26 pays/year</div>

</header>

<main>
  <nav class="tabs">

    <button id="navPayslips" onclick="showView('payslips')">📄 Payslips</button>

  <div id="view-dashboard"></div>

  <div id="view-employees" style="display:none"></div>
  <div id="view-period" style="display:none"></div>
  <div id="view-payslip" style="display:none"></div>
  <div id="modal-container"></div>
</main>

<footer>
  Quebec Payroll System &copy; 2026 — Runs in your browser · Data saved locally
</footer>

];

// ============================================================================
//  STORAGE
// ============================================================================

const STORAGE_KEY = "payroll_history_2026";
const EMP_STORAGE_KEY = "payroll_employees_2026";

function loadEmployees() {
  const raw = localStorage.getItem(EMP_STORAGE_KEY);
  if (raw) {
    try { return JSON.parse(raw); }
    catch (e) { return [...DEFAULT_EMPLOYEES]; }
  }
  return [...DEFAULT_EMPLOYEES];
}
function saveEmployees(list) {
  localStorage.setItem(EMP_STORAGE_KEY, JSON.stringify(list));
}
function getEmployees() { return loadEmployees(); }
function getActiveEmployees() { return getEmployees().filter(e => e.active); }
function getEmployee(code) { return getEmployees().find(e => e.code === code); }

function loadHistory() {
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw ? JSON.parse(raw) : [];
}
function saveHistory(history) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function ytdBefore(empCode, periodEnd) {
  const history = loadHistory();
  const totals = {
    gross: 0, regular_hours: 0, regular_amount: 0,
    holiday_hours: 0, holiday_amount: 0,
    vacation_hours: 0, vacation_amount: 0,
    special_amount: 0, maternity_hours: 0, maternity_amount: 0,
    federal_tax: 0, quebec_tax: 0,
    ei_ee: 0, qpip_ee: 0, qpp_ee: 0,
    medical: 0, pension_ee: 0,
    net_pay: 0, vacation_accrual: 0
  };
  history.forEach(p => {
    if (p.period.pay_end_date < periodEnd) {
      const row = p.results.find(r => r.employee_code === empCode);
      if (row) Object.keys(totals).forEach(k => { totals[k] += (row[k] || 0); });
    }
  });
  return totals;
}

// ============================================================================
//  TAX CALCULATIONS

function fmt(v) {
  if (typeof v !== 'number' || isNaN(v)) return "0.00";
  return v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function calculateBracket(annualIncome, brackets) {
  let tax = 0, remaining = annualIncome, lastUpper = 0;
  for (const b of brackets) {
    const upper = b.upper === null ? Infinity : b.upper;
    const slice = Math.min(remaining, upper - lastUpper);
    if (slice <= 0) break;
    tax += slice * b.rate;
    remaining -= slice;
    lastUpper = upper;
    if (remaining <= 0) break;
  }
  return tax;
}

function calculateFederalTax(grossThisPeriod, employee, periods) {
  const cfg = TAX_CONFIG.federal;
  const annual = grossThisPeriod * periods;
  const taxOnIncome = calculateBracket(annual, cfg.brackets);
  const bpa = employee.federal_td1_claim || cfg.basic_personal_amount;
  const cea = cfg.canada_employment_amount;
  const ei = Math.min(grossThisPeriod * TAX_CONFIG.ei.ee_rate * periods,
                       TAX_CONFIG.ei.annual_max_insurable * TAX_CONFIG.ei.ee_rate);
  const qpip = Math.min(grossThisPeriod * TAX_CONFIG.qpip.ee_rate * periods,
                         TAX_CONFIG.qpip.annual_max_insurable * TAX_CONFIG.qpip.ee_rate);
  const qpp = Math.min((annual - TAX_CONFIG.qpp.basic_exemption_annual) * TAX_CONFIG.qpp.ee_rate,
                        (TAX_CONFIG.qpp.annual_max_pensionable - TAX_CONFIG.qpp.basic_exemption_annual) * TAX_CONFIG.qpp.ee_rate);
  const credits = (bpa + cea + ei + qpip + Math.max(0, qpp)) * cfg.credit_rate;
  const netFed = Math.max(0, taxOnIncome - credits);
  const afterAbatement = netFed * (1 - cfg.quebec_abatement);
  return Math.max(0, afterAbatement / periods + (employee.additional_federal_tax || 0));
}

function calculateQuebecTax(grossThisPeriod, employee, periods) {
  const cfg = TAX_CONFIG.quebec;
  const annual = grossThisPeriod * periods;
  const taxOnIncome = calculateBracket(annual, cfg.brackets);
  const bpa = employee.provincial_td1_claim || cfg.basic_personal_amount;
  const workerDed = Math.min(annual * cfg.worker_deduction_rate, cfg.worker_deduction_max);
  const credits = bpa * cfg.credit_rate;
  const netQc = Math.max(0, taxOnIncome - workerDed - credits);
  return Math.max(0, netQc / periods + (employee.additional_quebec_tax || 0));
}

function calculatePay(employee, hours, periodEnd) {
  const rate = employee.rate_per_hour;
  const periods = COMPANY.pay_periods_per_year;
  const reg_hrs = hours.regular || 0, reg_amt = reg_hrs * rate;
  const hol_hrs = hours.holiday_paid || 0, hol_amt = hol_hrs * rate;
  const vac_hrs = hours.vacation_paid || 0, vac_amt = vac_hrs * rate;
  const spec_amt = hours.special || 0;
  const mat_hrs = hours.maternity || 0, mat_amt = mat_hrs * rate;
  const gross = reg_amt + hol_amt + vac_amt + spec_amt + mat_amt;
  const ytd = ytdBefore(employee.code, periodEnd);

  let qpp_ee = 0, qpp_er = 0;
  if (ytd.gross < TAX_CONFIG.qpp.annual_max_pensionable) {
    const pensionable = Math.max(0, gross - TAX_CONFIG.qpp.basic_exemption_annual / periods);
    const cap_remain = TAX_CONFIG.qpp.annual_max_pensionable - ytd.gross;
    const pens_capped = Math.min(pensionable, cap_remain);
    qpp_ee = pens_capped * TAX_CONFIG.qpp.ee_rate;
    qpp_er = pens_capped * TAX_CONFIG.qpp.er_rate;
  }
  let ei_ee = 0, ei_er = 0;
  if (!employee.tax_exempt_ei && ytd.gross < TAX_CONFIG.ei.annual_max_insurable) {
    const cap_remain = TAX_CONFIG.ei.annual_max_insurable - ytd.gross;
    const ins = Math.min(gross, cap_remain);
    ei_ee = ins * TAX_CONFIG.ei.ee_rate;
    ei_er = ei_ee * TAX_CONFIG.ei.er_multiplier;
  }
  let qpip_ee = 0, qpip_er = 0;
  if (ytd.gross < TAX_CONFIG.qpip.annual_max_insurable) {
    const cap_remain = TAX_CONFIG.qpip.annual_max_insurable - ytd.gross;
    const ins = Math.min(gross, cap_remain);
    qpip_ee = ins * TAX_CONFIG.qpip.ee_rate;
    qpip_er = ins * TAX_CONFIG.qpip.er_rate;
  }
  const fss = gross * TAX_CONFIG.fss.rate;
  let csst = 0;
  if (ytd.gross < TAX_CONFIG.csst.annual_max_insurable) {
    const cap_remain = TAX_CONFIG.csst.annual_max_insurable - ytd.gross;
    const ins = Math.min(gross, cap_remain);
    csst = ins * TAX_CONFIG.csst.rate;
  }
  const fed_tax = employee.tax_exempt_federal ? 0 : calculateFederalTax(gross, employee, periods);
  const qc_tax = employee.tax_exempt_quebec ? 0 : calculateQuebecTax(gross, employee, periods);
  const vac_accrual = gross * employee.vacation_rate;

  // Post-tax / benefit deductions (only when employee earned this pay)
  const medical = gross > 0 ? (employee.medical_insurance || 0) : 0;
  const pension_ee = gross > 0 ? (employee.pension_ee || 0) : 0;

  const total_deductions = fed_tax + qc_tax + ei_ee + qpip_ee + qpp_ee + medical + pension_ee;
  const net_pay = gross - total_deductions;

  return {
    employee_code: employee.code,
    regular_hours: reg_hrs, regular_amount: reg_amt,
    holiday_hours: hol_hrs, holiday_amount: hol_amt,
    vacation_hours: vac_hrs, vacation_amount: vac_amt,
    special_amount: spec_amt,
    maternity_hours: mat_hrs, maternity_amount: mat_amt,
    gross, federal_tax: fed_tax, quebec_tax: qc_tax,
    ei_ee, ei_er, qpip_ee, qpip_er, qpp_ee, qpp_er,
    fss, csst, medical, pension_ee,
    total_deductions, net_pay, vacation_accrual, ytd
  };
}

function runPeriod(periodEnd, payDate, hoursByEmp) {
  const history = loadHistory();
  const prevCount = history.filter(p => p.period.pay_end_date < periodEnd).length;
  const period = {
    pay_end_date: periodEnd, payment_date: payDate,
    pay_number: prevCount + 1, year: parseInt(periodEnd.substring(0, 4))
  };
  const results = getActiveEmployees().map(emp => {
    const hours = hoursByEmp[emp.code] || {};
    return calculatePay(emp, hours, periodEnd);
  });
  const record = {period, results};
  const existingIdx = history.findIndex(p => p.period.pay_end_date === periodEnd);
  if (existingIdx >= 0) history[existingIdx] = record;
  else {
    history.push(record);
    history.sort((a, b) => a.period.pay_end_date.localeCompare(b.period.pay_end_date));
  }
  saveHistory(history);
  return record;
}

function showView(view) {
  ['dashboard', 'newPeriod', 'payslips', 'history', 'employees', 'period', 'payslip'].forEach(v => {
    const el = document.getElementById(`view-${v}`);
    if (el) el.style.display = v === view ? '' : 'none';
  });
  const tabMap = {dashboard:'navDashboard', newPeriod:'navNewPeriod', payslips:'navPayslips',
                   history:'navHistory', employees:'navEmployees',
                   period:'navHistory', payslip:'navPayslips'};
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById(tabMap[view]);
  if (activeBtn) activeBtn.classList.add('active');

  if (view === 'dashboard') renderDashboard();
  if (view === 'newPeriod') renderNewPeriod();
  if (view === 'payslips') renderPayslipsList();
  if (view === 'history') renderHistory();
  if (view === 'employees') renderEmployees();

  window.scrollTo({top: 0, behavior: 'smooth'});
}

function updatePayDate() {
  const end = document.getElementById('periodEnd').value;
  if (end) {
    const d = new Date(end);
    d.setDate(d.getDate() + 6);
    document.getElementById('payDate').value = d.toISOString().split('T')[0];
  }
}

function submitPayPeriod() {
  const periodEnd = document.getElementById('periodEnd').value;
  const payDate = document.getElementById('payDate').value;
  if (!periodEnd || !payDate) { alert('Please enter both period end and payment dates'); return; }
  const active = getActiveEmployees();
  const hoursByEmp = {};
  active.forEach(emp => {
    hoursByEmp[emp.code] = {
      regular: parseFloat(document.getElementById(`reg_${emp.code}`).value || 0),
      holiday_paid: parseFloat(document.getElementById(`hol_${emp.code}`).value || 0),
      vacation_paid: parseFloat(document.getElementById(`vac_${emp.code}`).value || 0),
      special: parseFloat(document.getElementById(`spec_${emp.code}`).value || 0),
      maternity: parseFloat(document.getElementById(`mat_${emp.code}`).value || 0),
    };
  });
  runPeriod(periodEnd, payDate, hoursByEmp);
  viewPeriod(periodEnd);
}

        <h3>No payslips yet</h3>

  const employees = getEmployees();

  document.getElementById('payslipsContent').innerHTML = `
    <div class="card">
      <h2><span class="icon">👥</span> Payslips for ${rec.period.pay_end_date}</h2>
      <table>
        <thead>
          <tr><th>Employee</th><th>Gross</th><th>Total Tax</th><th>Net Pay</th><th></th></tr>
        </thead>
        <tbody>
          ${rec.results.filter(r => r.gross > 0).map(r => {
            const emp = employees.find(e => e.code === r.employee_code);
            return `

              </tr>`;

  `;
}

function showPayslip(periodEnd, empCode) {
  const history = loadHistory();
  const rec = history.find(p => p.period.pay_end_date === periodEnd);
  if (!rec) return;
  const r = rec.results.find(x => x.employee_code === empCode);
  const emp = getEmployee(empCode);
  if (!r || !emp) return;

  const ytdGross = (r.ytd.gross || 0) + r.gross;
  const ytdNet = (r.ytd.net_pay || 0) + r.net_pay;
  const ytdFed = (r.ytd.federal_tax || 0) + r.federal_tax;
  const ytdQc = (r.ytd.quebec_tax || 0) + r.quebec_tax;
  const ytdEi = (r.ytd.ei_ee || 0) + r.ei_ee;
  const ytdQpip = (r.ytd.qpip_ee || 0) + r.qpip_ee;
  const ytdQpp = (r.ytd.qpp_ee || 0) + r.qpp_ee;
  const ytdMedical = (r.ytd.medical || 0) + (r.medical || 0);
  const ytdPension = (r.ytd.pension_ee || 0) + (r.pension_ee || 0);
  const ytdVacAccr = (r.ytd.vacation_accrual || 0) + r.vacation_accrual;
  const ytdVacPaid = (r.ytd.vacation_amount || 0) + r.vacation_amount;
  const vacBalance = ytdVacAccr - ytdVacPaid;
  const ytdRegHrs = (r.ytd.regular_hours || 0) + r.regular_hours;
  const ytdRegAmt = (r.ytd.regular_amount || 0) + r.regular_amount;
  const ytdHolHrs = (r.ytd.holiday_hours || 0) + r.holiday_hours;

function renderHistory() {
  const history = loadHistory();
  document.getElementById('view-history').innerHTML = `

      ${history.length === 0 ? `
        <div class="empty-state"><div class="icon">📭</div><p>No pay periods yet.</p></div>
      ` : `
        <table>
          <thead><tr><th>Period End</th><th>Pay #</th><th>Pay Date</th><th>Gross</th><th>Net</th><th>Employees</th><th></th></tr></thead>
          <tbody>
            ${history.slice().reverse().map(p => {
              const tg = p.results.reduce((s, r) => s + r.gross, 0);
              const tn = p.results.reduce((s, r) => s + r.net_pay, 0);
              const paid = p.results.filter(r => r.gross > 0).length;
              return `
                <tr>
                  <td><strong>${p.period.pay_end_date}</strong></td>
                  <td><span class="pill">#${p.period.pay_number}</span></td>
                  <td>${p.period.payment_date}</td>
                  <td class="num">$${fmt(tg)}</td>
                  <td class="num" style="color:var(--success);">$${fmt(tn)}</td>
                  <td>${paid}</td>
                  <td>
                    <button class="primary small" onclick="viewPeriod('${p.period.pay_end_date}')">View</button>
                    <button class="danger" onclick="deletePeriod('${p.period.pay_end_date}')">Delete</button>
                  </td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
      `}
    </div>

    <div class="card">
      <h2><span class="icon">💾</span> Backup &amp; Restore</h2>
      <p style="color:var(--gray-500);font-size:13px;margin-bottom:16px;">
        Data is stored in your browser. Export regularly to back up.
      </p>
      <button class="secondary" onclick="exportData()">📥 Export All Data</button>
      <button class="secondary" onclick="document.getElementById('importFile').click()" style="margin-left:8px;">📤 Import Data</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="danger" onclick="clearAllData()" style="margin-left:8px;">🗑 Clear All History</button>
    </div>
  `;
}

function deletePeriod(periodEnd) {
  if (!confirm(`Delete pay period ${periodEnd}? This cannot be undone.`)) return;
  saveHistory(loadHistory().filter(p => p.period.pay_end_date !== periodEnd));
  renderHistory();
}
function clearAllData() {
  if (!confirm('Clear ALL payroll history? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  renderHistory();
}
function exportData() {
  const data = {history: loadHistory(), employees: loadEmployees()};
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `payroll_backup_${COMPANY.payroll_year}.json`;
  a.click(); URL.revokeObjectURL(url);
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      // Support both new format and old (array only)
      const hist = Array.isArray(data) ? data : data.history;
      const emps = data.employees;
      if (!Array.isArray(hist)) throw new Error('Invalid format');
      if (!confirm(`Replace data with ${hist.length} period(s)${emps ? ' and ' + emps.length + ' employees' : ''}?`)) return;
      saveHistory(hist);
      if (emps) saveEmployees(emps);
      renderHistory();
      alert('✅ Data imported');
    } catch (err) { alert('❌ Invalid file: ' + err.message); }
  };
  reader.readAsText(file);
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';

function saveEmployee(isEdit) {
  const fields = ['code','employee_id','first_name','last_name','occupation','department',
                  'sin','hire_date','address_line_1','address_line_2','city','province','postal_code'];
  const numFields = ['rate_per_hour','federal_td1_claim','provincial_td1_claim',
                     'additional_federal_tax','additional_quebec_tax',
                     'medical_insurance','pension_ee'];
  const data = {};
  fields.forEach(f => data[f] = (document.getElementById('emp_' + f) || {}).value || '');
  numFields.forEach(f => data[f] = parseFloat(document.getElementById('emp_' + f).value) || 0);
  data.vacation_rate = (parseFloat(document.getElementById('emp_vacation_rate_pct').value) || 0) / 100;
  data.active = document.getElementById('emp_active').checked;
  data.tax_exempt_ei = document.getElementById('emp_tax_exempt_ei').checked;

  if (!data.first_name || !data.last_name) { alert('First and last name are required'); return; }
  if (!data.code) { alert('Employee code is required'); return; }

  const list = getEmployees();
  const idx = list.findIndex(e => e.code === data.code);
  if (idx >= 0) {
    list[idx] = {...list[idx], ...data};
  } else {
    if (list.some(e => e.code === data.code)) { alert('Employee code already exists'); return; }
    list.push(data);
  }
  saveEmployees(list);
  closeModal();
  renderEmployees();
}

function deleteEmployee(code) {
  if (!confirm('Delete this employee? Past pay history will remain but the employee will no longer appear.')) return;
  saveEmployees(getEmployees().filter(e => e.code !== code));
  closeModal();
  renderEmployees();
}
